# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: q0o0p
subtitle:
description:
keywords:
author: John Doe
language: en
timezone:

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: https://github.com/q0o0p-wow/q0o0p-wow.github.io
#https://github.com/q0o0p-wow/q0o0p-wow.github.io
#http://q0o0p.top
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing index.html from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: true # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude:
filename_case: 0
render_drafts: true #更改2019.12.21
post_asset_folder: true
relative_link: true   #更改2019.12.21
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace:

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## Use post's date for updated date unless set in front-matter
use_date_for_updated: false

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: Butterfly
#diaspora
  #hexo-theme-antiquity

# Deployment
## Docs: https://hexo.io/docs/deployment.html
deploy:
  type: git
  #https://github.com/q0o0p-wow/q0o0p-wow.github.io.git
  repo:  git@github.com:q0o0p-wow/q0o0p-wow.github.io.git
 # repository: git@github.com:q0o0p-wow/q0o0p-wow.github.io.git
  branch: master  #github上的链接博客的主分支
  message: blog

live2d:
  enable: true
  scriptFrom: local  #默认
  pluginRootPath: live2dw/ #插件在站点上是根目录
  pluginJsPath: lib/   #脚本文件相对于插件根目录路径
  pluginModelPath: assets/  #模型文件相对于与插件根目录路径
  tagMode: false  # 标签模式, 是否仅替换 live2d tag标签而非插入到所有页面中
  debug: false  # 调试, 是否在控制台输出日志
  model:
    use: live2d-widget #live2d-widget-model-z16 #live2d-widget-model-shizuku #要修改的 或者
  display:
    position: left    #在屏幕上显示的位置
    width: 150     #宽度
    height: 300    #高度
  mobile:   #是否用于移动端
    show: true  #手机是否显示
